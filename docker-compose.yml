services:
  backend:
    build:
      context: ./backend/
      dockerfile: Dockerfile
    ports:
      - 8080:8080
    volumes:
      - ./backend:/app 
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/feed_gg?sslmode=disable
  frontend:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
    ports:
      - 3000:3000 
  db:
    image: "postgres:16"
    container_name: feed_gg_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=feed_gg
      - POSTGRES_USER=postgres
    volumes:
      - db-store:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d feed_gg"]
      interval: 5s
      timeout: 5s
      retries: 10
  migrate:
    build:
      context: ./backend/
      dockerfile: Dockerfile.migrate
    working_dir: /workspace
    volumes:
      - .:/workspace
    depends_on:
      db:
        condition: service_healthy
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://postgres:password@db:5432/feed_gg?sslmode=disable
      - GOOSE_MIGRATION_DIR=backend/migrations
    profiles:
      - tools

volumes:
  db-store:
